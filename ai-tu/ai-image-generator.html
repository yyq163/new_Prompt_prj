<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>帧界图片生成器快速版</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='24' fill='%230057df'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --page-bg: #e5eaf2;
      --bg: #f8fafc;
      --sidebar: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f3f6fb;
      --preview: #d1d1d3;
      --ink: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --strong-line: #cbd5e1;
      --blue: #0057df;
      --yellow: #b45309;
      --danger: #e0523f;
      --ok: #087052;
      --shadow: 0 16px 38px rgba(31, 31, 36, .06);
      --panel-shadow: 0 18px 46px rgba(15, 23, 42, .08);
      --radius: 16px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--page-bg);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a.button-link {
      border: 0;
      border-radius: 10px;
      min-height: 44px;
      padding: 0 18px;
      cursor: pointer;
      background: var(--surface);
      color: var(--ink);
      text-decoration: none;
      display: inline-grid;
      place-items: center;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
    }

    button:hover,
    a.button-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(36, 36, 42, .12);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
      box-shadow: none;
    }

    .primary {
      min-width: 142px;
      background: var(--yellow);
      color: #ffffff;
      font-weight: 700;
    }

    .ghost {
      border: 1px solid var(--line);
      background: var(--surface);
      color: #5f606d;
    }

    .icon-button {
      width: 42px;
      min-width: 42px;
      padding: 0;
      border: 1px solid var(--strong-line);
      background: #f8f8fc;
      color: #34343b;
    }

    .app-shell {
      width: min(100%, 1360px);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      grid-template-rows: 70px minmax(0, 1fr);
      background: var(--bg);
      border: 0;
      box-shadow: 0 24px 70px rgba(30, 41, 59, .10);
      overflow: hidden;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .sidebar {
      position: relative;
      z-index: 5;
      background: var(--sidebar);
      padding: 26px 18px;
      display: grid;
      grid-template-rows: 1fr auto;
      align-content: start;
      gap: 24px;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      padding: 0 2px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--blue);
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      min-width: 0;
      color: #24242b;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }

    .nav {
      display: grid;
      align-content: start;
      gap: 26px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 52px;
      padding: 0 10px;
      border-radius: 12px;
      background: transparent;
      color: #2f2f35;
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      box-shadow: none;
    }

    .nav-button:hover {
      background: #f7f7fa;
      transform: none;
      box-shadow: none;
    }

    .nav-button.active {
      background: #f1f5ff;
      color: var(--blue);
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      color: currentColor;
    }

    .nav-icon svg {
      display: block;
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .side-status {
      display: grid;
      gap: 8px;
      align-self: end;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: #626371;
      font-size: 13px;
      line-height: 1.45;
    }

    .mode-pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff4ff;
      color: #0057df;
      font-weight: 800;
    }

    .mode-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .workspace {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(620px, 760px) minmax(300px, 360px);
      justify-content: center;
      gap: 28px;
      padding: 32px 36px 40px;
      overflow: auto;
      align-items: start;
    }

    .workspace.config-open {
      grid-template-columns: minmax(0, 1fr);
    }

    .workspace-main,
    .history-column,
    .config-panel {
      min-width: 0;
    }

    .workspace-main {
      display: grid;
      gap: 0;
      align-content: start;
    }

    .workspace-main > * {
      min-width: 0;
      max-width: 100%;
    }

    .generator-view {
      width: 100%;
      justify-self: end;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--panel-shadow);
      overflow: hidden;
    }

    .section-title {
      margin: 0 0 10px 10px;
      color: #626371;
      font-size: 15px;
      font-weight: 700;
    }

    .generator-view > .section-title {
      margin: 0;
      padding: 18px 24px 12px;
    }

    .preview-card {
      position: sticky;
      top: 0;
      z-index: 1;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      background: var(--surface);
      box-shadow: none;
      border-bottom: 1px solid var(--line);
    }

    .preview-stage {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .14), rgba(18, 18, 26, .32)),
        var(--preview);
    }

    .preview-stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background:
        linear-gradient(45deg, #eeeeef 25%, transparent 25%),
        linear-gradient(-45deg, #eeeeef 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eeeeef 75%),
        linear-gradient(-45deg, transparent 75%, #eeeeef 75%);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
    }

    .preview-stage:fullscreen,
    .preview-stage:-webkit-full-screen,
    .preview-stage.is-immersive-preview {
      position: fixed;
      inset: 0;
      z-index: 1000;
      width: 100vw;
      height: 100vh;
      aspect-ratio: auto;
      display: block;
      background: #111116;
    }

    .preview-stage:fullscreen img,
    .preview-stage:-webkit-full-screen img,
    .preview-stage.is-immersive-preview img {
      position: absolute;
      left: 0;
      top: 0;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      object-fit: initial;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
      pointer-events: none;
    }

    .preview-stage:fullscreen,
    .preview-stage:-webkit-full-screen,
    .preview-stage.is-immersive-preview {
      cursor: grab;
      touch-action: none;
    }

    .preview-stage.is-dragging:fullscreen,
    .preview-stage.is-dragging:-webkit-full-screen,
    .preview-stage.is-dragging.is-immersive-preview {
      cursor: grabbing;
    }

    .preview-stage:fullscreen .preview-toolbar,
    .preview-stage:-webkit-full-screen .preview-toolbar,
    .preview-stage.is-immersive-preview .preview-toolbar {
      top: 24px;
      right: 24px;
      z-index: 3;
    }

    .preview-stage:fullscreen .preview-caption,
    .preview-stage:-webkit-full-screen .preview-caption,
    .preview-stage.is-immersive-preview .preview-caption {
      left: 24px;
      bottom: 24px;
      max-width: calc(100% - 48px);
      z-index: 3;
    }

    .preview-stage:fullscreen .preview-placeholder,
    .preview-stage:-webkit-full-screen .preview-placeholder,
    .preview-stage.is-immersive-preview .preview-placeholder {
      pointer-events: none;
    }

    .preview-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #646574;
      text-align: center;
      padding: 28px;
    }

    .preview-placeholder strong {
      display: block;
      color: #555560;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .preview-toolbar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .preview-caption {
      position: absolute;
      left: 20px;
      bottom: 18px;
      max-width: min(560px, calc(100% - 40px));
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .78);
      color: #555560;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(16px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      min-height: 60px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .tab-button {
      height: 60px;
      min-height: 60px;
      border-radius: 0;
      background: transparent;
      color: #6e6f7d;
      font-size: 16px;
      font-weight: 800;
      box-shadow: none;
      position: relative;
    }

    .tab-button:hover {
      transform: none;
      box-shadow: none;
      background: #fbfbfd;
    }

    .tab-button.active {
      color: #393942;
    }

    .tab-button.active::after {
      content: "";
      position: absolute;
      left: 30%;
      right: 30%;
      bottom: 0;
      height: 2px;
      background: #383842;
    }

    .prompt-card {
      min-width: 0;
      max-width: 100%;
      padding: 28px 32px 32px;
      background: var(--surface);
    }

    .prompt-box {
      min-height: 168px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8fafc;
      resize: vertical;
      padding: 20px;
      color: #34343c;
      line-height: 1.55;
      outline: none;
      font-size: 15px;
    }

    .prompt-box:focus,
    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(8, 102, 255, .45);
      box-shadow: 0 0 0 4px rgba(8, 102, 255, .08);
    }

    .control-row {
      display: grid;
      grid-template-columns: 152px minmax(0, 1fr) minmax(0, 1fr);
      grid-template-areas:
        "generate count aspect"
        "generate resolution resolution"
        "quality output clear"
        "feedback feedback feedback";
      gap: 12px;
      align-items: stretch;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #f8fafc;
    }

    .generate-action {
      grid-area: generate;
      width: 100%;
      min-height: 100px;
      align-self: stretch;
      border-radius: 14px;
      font-size: 16px;
    }

    .control-count {
      grid-area: count;
    }

    .control-aspect {
      grid-area: aspect;
    }

    .control-quality {
      grid-area: quality;
    }

    .control-output {
      grid-area: output;
    }

    .clear-action {
      grid-area: clear;
      width: 100%;
      min-height: 44px;
      background: #ffffff;
      color: #64748b;
      font-weight: 800;
    }

    .config-feedback {
      min-height: 18px;
      margin-top: -4px;
      color: #8b8c98;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .config-feedback.good {
      color: #287a44;
    }

    .config-feedback.bad {
      color: #bd3434;
    }

    .config-feedback.busy {
      color: #6f707b;
    }

    .generator-feedback {
      grid-area: feedback;
      min-height: 18px;
      margin-top: 0;
      color: #6f707d;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .generator-feedback.good {
      color: #287a44;
    }

    .generator-feedback.bad {
      color: #bd3434;
    }

    .generator-feedback.busy {
      color: #555763;
    }

    .optimizer-panel {
      margin-top: 12px;
      border: 1px solid rgba(128, 140, 166, .22);
      border-radius: 14px;
      background: rgba(255, 255, 255, .72);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .optimizer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .optimizer-title {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
    }

    .optimizer-tools,
    .optimizer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .optimizer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 10px;
    }

    .optimizer-field {
      display: grid;
      gap: 6px;
      color: #6f707d;
      font-size: 12px;
      font-weight: 800;
    }

    .optimizer-field input,
    .optimizer-field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid rgba(128, 140, 166, .28);
      border-radius: 10px;
      background: #fff;
      color: #30313a;
      padding: 0 10px;
      font: inherit;
      font-weight: 700;
      outline: none;
    }

    .optimizer-reference-list {
      display: grid;
      gap: 10px;
    }

    .optimizer-reference-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
      gap: 8px;
      align-items: end;
      padding: 10px;
      border: 1px solid rgba(128, 140, 166, .2);
      border-radius: 12px;
      background: rgba(248, 250, 252, .82);
    }

    .optimizer-reference-row .wide {
      grid-column: span 2;
    }

    .optimizer-reference-row .remove-reference {
      width: 38px;
      height: 38px;
      min-width: 38px;
      padding: 0;
    }

    .optimizer-status {
      min-height: 18px;
      color: #6f707d;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .optimizer-status.good {
      color: #287a44;
    }

    .optimizer-status.bad {
      color: #bd3434;
    }

    .optimizer-status.busy {
      color: #555763;
    }

    .optimizer-trace {
      color: #6f707d;
      font-size: 12px;
      font-weight: 800;
      word-break: break-all;
    }

    .optimizer-warnings {
      margin: 0;
      padding-left: 18px;
      color: #6f707d;
      font-size: 12px;
      font-weight: 700;
    }

    .app-toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 60;
      max-width: 360px;
      padding: 12px 14px;
      border: 1px solid rgba(34, 34, 42, .08);
      border-radius: 12px;
      background: rgba(255, 255, 255, .96);
      color: #43444f;
      box-shadow: 0 18px 40px rgba(30, 30, 38, .16);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.4;
      pointer-events: none;
    }

    .app-toast.good {
      color: #287a44;
      border-color: rgba(40, 122, 68, .16);
    }

    .app-toast.bad {
      color: #bd3434;
      border-color: rgba(189, 52, 52, .18);
    }

    .app-toast.busy {
      color: #555763;
    }

    .select-chip {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .select-chip span {
      flex: 0 0 auto;
      min-width: 58px;
      padding: 0 10px 0 12px;
      color: #64748b;
      font-size: 14px;
      font-weight: 800;
    }

    .select-chip select,
    .select-chip input {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      border: 0;
      border-left: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: #3d3d47;
      font-weight: 800;
      padding: 0 12px;
      outline: none;
    }

    .compact-input {
      width: 92px;
    }

    .resolution-block {
      grid-area: resolution;
      display: grid;
      gap: 6px;
      align-self: start;
      min-width: 0;
    }

    .resolution-note {
      color: #6f707d;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      white-space: normal;
      padding-left: 2px;
    }

    .size-inline {
      color: #6f707b;
      font-weight: 800;
    }

    .prompt-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 10px 10px;
    }

    .prompt-head .section-title {
      margin: 0;
    }

    .reference-film {
      min-width: 0;
      display: none;
      align-items: center;
      width: 112px;
      max-width: 620px;
      min-height: 62px;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .78);
      overflow: visible;
      scrollbar-width: none;
      transition: width .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .prompt-card.image-mode .reference-film,
    .reference-film.has-items {
      display: flex;
    }

    .reference-film:hover,
    .reference-film:focus-within {
      width: min(620px, 100%);
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 10px 28px rgba(34, 34, 42, .08);
    }

    .prompt-card.image-mode .reference-film {
      width: min(620px, 100%);
      background: rgba(255, 255, 255, .92);
      overflow-x: auto;
      overflow-y: visible;
    }

    .reference-film::-webkit-scrollbar {
      display: none;
    }

    .asset-tile {
      position: relative;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      margin-left: -28px;
      transform: rotate(-7deg);
      transform-origin: center;
      overflow: visible;
      z-index: 1;
      transition: margin-left .2s ease, transform .18s ease, z-index .18s ease;
    }

    .asset-tile:first-child {
      margin-left: 0;
    }

    .asset-tile:nth-child(even) {
      transform: rotate(5deg) translateY(-1px);
    }

    .reference-film:hover .asset-tile,
    .reference-film:focus-within .asset-tile {
      margin-left: 4px;
    }

    .prompt-card.image-mode .asset-tile {
      margin-left: 4px;
      transform: none;
    }

    .reference-film:hover .asset-tile:first-child,
    .reference-film:focus-within .asset-tile:first-child,
    .prompt-card.image-mode .asset-tile:first-child {
      margin-left: 0;
    }

    .asset-tile:hover,
    .asset-tile.selected {
      transform: rotate(0deg) translateY(-7px) scale(1.08);
      z-index: 8;
    }

    .asset-preview,
    .asset-upload,
    .asset-loading {
      width: 46px;
      height: 46px;
      min-height: 46px;
      border: 0;
      border-radius: 4px;
      background: #f1f2f5;
      color: #a2a4af;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 7px 15px rgba(40, 40, 48, .12);
    }

    .asset-preview:hover,
    .asset-upload:hover {
      transform: none;
      box-shadow: 0 9px 18px rgba(40, 40, 48, .15);
    }

    .asset-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .asset-upload {
      position: relative;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 9px;
      line-height: 1.25;
      font-weight: 800;
      cursor: pointer;
    }

    .asset-upload .plus {
      display: block;
      color: #9ba0ac;
      font-size: 21px;
      line-height: .85;
      font-weight: 400;
    }

    .asset-upload input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-input-proxy {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .asset-loading {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 3px;
      padding: 6px 5px 10px;
      color: #7b8190;
      font-size: 9px;
      line-height: 1.15;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(180deg, #f7f8fb, #eef2f7);
    }

    .asset-loading::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgba(0, 87, 223, .14) 42%, transparent 64%);
      transform: translateX(-100%);
      animation: asset-upload-sweep 1.1s linear infinite;
    }

    .asset-loading-label,
    .asset-loading-percent {
      position: relative;
      z-index: 1;
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .asset-loading-percent {
      color: #0057df;
      font-size: 8px;
      line-height: 1;
    }

    .asset-progress {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 5px;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0, 87, 223, .13);
    }

    .asset-progress > b {
      content: "";
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: #0057df;
      transition: width .18s ease;
    }

    .asset-progress.is-indeterminate > b {
      width: 46%;
      animation: asset-upload-progress 1s ease-in-out infinite;
    }

    @keyframes asset-upload-sweep {
      to {
        transform: translateX(100%);
      }
    }

    @keyframes asset-upload-progress {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(240%);
      }
    }

    .asset-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 9px);
      transform: translateX(-50%) translateY(4px);
      min-width: 62px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #20242b;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(21, 24, 30, .22);
    }

    .asset-tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 8px;
      height: 8px;
      background: #20242b;
      transform: translate(-50%, -5px) rotate(45deg);
    }

    .asset-remove {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 18px;
      min-width: 18px;
      height: 18px;
      min-height: 18px;
      padding: 0;
      border-radius: 50%;
      background: #2a2d34;
      color: #ffffff;
      font-size: 14px;
      line-height: 18px;
      opacity: 0;
      box-shadow: 0 4px 10px rgba(25, 25, 30, .2);
    }

    .asset-add-badge {
      position: absolute;
      right: -7px;
      bottom: -7px;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f6f7fa;
      color: #5f6470;
      font-size: 19px;
      box-shadow: 0 5px 14px rgba(36, 36, 42, .12);
      pointer-events: none;
    }

    .asset-tile.has-image:hover .asset-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .asset-tile.has-image:hover .asset-remove {
      opacity: 1;
    }

    .history-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--line);
    }

    .history-actions a,
    .history-actions button,
    .history-actions span {
      min-height: 30px;
      border-radius: 0;
      background: transparent;
      color: #727380;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      display: grid;
      place-items: center;
      padding: 0;
      box-shadow: none;
    }

    .history-thumb.status-thumb {
      display: grid;
      place-items: center;
      color: #686977;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      padding: 6px;
    }

    .history-card.failed .history-thumb.status-thumb {
      color: #bd3434;
      border-color: rgba(189, 52, 52, .24);
      background: #fff4f2;
    }

    .history-card.succeeded .avatar {
      background: #087052;
    }

    .history-card.failed .avatar {
      background: #bd3434;
    }

    .history-actions a + button {
      border-left: 1px solid var(--line);
    }

    .history-variants {
      grid-column: 1 / -1;
      display: flex;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      padding: 2px 0 0;
    }

    .history-variant {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border: 1px solid var(--strong-line);
      border-radius: 8px;
      overflow: hidden;
      padding: 0;
      background: #f6f7fa;
      box-shadow: none;
    }

    .history-variant img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .history-count {
      color: #0866ff;
    }

    .history-column {
      position: sticky;
      top: 32px;
      z-index: 2;
      display: grid;
      align-content: start;
      gap: 14px;
      width: 100%;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 14px 34px rgba(15, 23, 42, .05);
      backdrop-filter: blur(10px);
    }

    .history-column .section-title {
      margin: 0 0 2px;
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-empty {
      min-height: 108px;
      border: 1px dashed var(--strong-line);
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #696a76;
      background: rgba(255, 255, 255, .9);
      text-align: center;
      padding: 20px;
    }

    .history-card {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 90px;
      padding: 14px 16px;
      border: 1px solid transparent;
      border-radius: 18px;
      background: var(--surface);
      color: #353541;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .05);
    }

    .history-card.selected {
      border-color: rgba(8, 102, 255, .38);
      box-shadow: 0 0 0 3px rgba(8, 102, 255, .08);
    }

    .history-thumb {
      width: 54px;
      height: 54px;
      border: 1px solid var(--strong-line);
      border-radius: 10px;
      overflow: hidden;
      background:
        linear-gradient(45deg, #eee 25%, transparent 25%),
        linear-gradient(-45deg, #eee 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eee 75%),
        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    .history-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .history-title {
      min-width: 0;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
      color: #8e8f9c;
      font-size: 12px;
      font-weight: 700;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #999aa7;
      color: white;
      font-size: 12px;
      font-weight: 800;
    }

    .more {
      width: 34px;
      min-width: 34px;
      height: 34px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #a8a9b6;
      font-size: 24px;
      letter-spacing: 2px;
      display: grid;
      place-items: center;
      box-shadow: none;
    }

    .more:hover,
    .more:focus-visible {
      background: #f4f5f8;
      color: #555765;
    }

    .config-panel {
      display: none;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      align-content: start;
      gap: 18px;
    }

    .config-panel.active {
      display: grid;
    }

    .generator-view.hidden,
    .history-column.hidden {
      display: none;
    }

    .config-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .config-title {
      margin: 0 0 20px;
      font-size: 22px;
      line-height: 1.2;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: #777887;
      font-size: 13px;
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfbfc;
      color: #33333c;
      outline: none;
      padding: 10px 12px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
    }

    .payload {
      min-height: 220px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre;
      overflow: auto;
    }

    .meter {
      display: grid;
      gap: 6px;
      color: #8b8c98;
      font-size: 12px;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #ededf2;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      max-width: 100%;
      background: var(--blue);
      transition: width .25s ease;
    }

    .check-inline.good {
      color: var(--ok);
      font-weight: 800;
    }

    .check-inline.bad {
      color: #a83022;
      font-weight: 800;
    }

    .check-inline.busy {
      color: #1736a8;
      font-weight: 800;
    }

    .small-note {
      color: #8d8e99;
      font-size: 12px;
      line-height: 1.45;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1280px) {
      .app-shell {
        width: 100%;
        margin: 0;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr);
      }

      .generator-view {
        width: 100%;
      }

      .history-column {
        grid-row: 2;
        position: relative;
        top: auto;
      }

      .reference-film {
        max-width: 520px;
      }
    }

    @media (max-width: 980px) {
      .control-row {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "generate generate"
          "count aspect"
          "resolution resolution"
          "quality output"
          "clear clear"
          "feedback feedback";
      }

      .generate-action {
        min-height: 52px;
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow-x: hidden;
      }

      .app-shell {
        width: 100%;
        min-height: 100vh;
        margin: 0;
        grid-template-columns: 1fr;
        grid-template-rows: 64px auto minmax(0, 1fr);
        border: 0;
      }

      .topbar {
        padding: 0 16px;
      }

      .sidebar {
        grid-template-rows: auto;
        gap: 12px;
        padding: 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .side-status {
        display: none;
      }

      .workspace {
        width: 100%;
        max-width: 100vw;
        grid-template-columns: minmax(0, 1fr);
        padding: 16px 12px 28px;
        overflow-x: hidden;
      }

      .control-row {
        grid-template-columns: 1fr;
        grid-template-areas:
          "generate"
          "count"
          "aspect"
          "resolution"
          "quality"
          "output"
          "clear"
          "feedback";
      }

      .generator-view,
      .preview-card,
      .prompt-card,
      .history-column,
      .config-panel,
      .config-card {
        width: 100%;
        max-width: 100%;
      }

      .generator-view,
      .history-column {
        border-radius: 18px;
      }

      .preview-card {
        position: relative;
      }

      .preview-stage {
        min-height: 220px;
        aspect-ratio: auto;
      }

      .preview-toolbar {
        top: 14px;
        right: 14px;
      }

      .prompt-card {
        padding: 16px 12px 18px;
      }

      .prompt-box {
        min-height: 120px;
      }

      .control-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
      }

      .control-row > .primary,
      .control-row > .ghost,
      .control-row > .select-chip,
      .control-row > .resolution-block {
        width: 100%;
        min-width: 0;
      }

      .select-chip {
        min-width: 0;
      }

      .select-chip select,
      .select-chip input {
        min-width: 0;
        width: 100%;
      }

      .resolution-note {
        white-space: normal;
      }

      .history-column {
        min-width: 0;
      }

      .reference-film,
      .optimizer-grid,
      .optimizer-reference-row,
      .two {
        grid-template-columns: 1fr;
      }

      .optimizer-reference-row .wide {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <h1 class="brand-title">帧界图片生成器快速版</h1>
      </div>
    </header>

    <aside class="sidebar" aria-label="左侧导航">
      <nav class="nav">
        <button class="nav-button active" id="navGenerator" type="button" aria-current="page" data-view="generator" onclick="window.switchImageToolView && window.switchImageToolView('generator')">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 4h4.2l1.4 2H19a2 2 0 0 1 2 2v10.5A1.5 1.5 0 0 1 19.5 20h-15A1.5 1.5 0 0 1 3 18.5V6a2 2 0 0 1 2-2Zm6.7 8.3-2.1 2.8h8.8l-2.8-3.7-2.1 2.7-1.8-1.8Z"/></svg>
          </span>
          <span>图片生成器</span>
        </button>
      </nav>

      <div class="side-status">
        <span class="mode-pill" id="modeChip">文生图</span>
        <span id="serviceText">服务：当前浏览器地址</span>
        <span id="refCountText">0 / 16 参考图</span>
        <span>内网异步生成；任务结果按浏览器会话隔离。</span>
      </div>
    </aside>

    <section class="workspace">
      <div class="workspace-main generator-view" id="generatorView">
        <h2 class="section-title">预览</h2>
        <section class="preview-card" aria-label="图片预览窗">
          <div class="preview-stage" id="previewStage">
            <div class="preview-placeholder" id="previewPlaceholder">
              <div>
                <strong>预览窗</strong>
                <span>上传参考图或生成图片后，点击任意图片在这里查看。</span>
              </div>
            </div>
            <img id="mainPreviewImage" alt="当前预览图片" hidden>
            <div class="preview-toolbar">
              <button class="icon-button" id="downloadPreviewBtn" type="button" title="下载当前预览" disabled>⇩</button>
              <button class="icon-button" id="fitPreviewBtn" type="button" title="全屏预览" aria-label="全屏预览">⛶</button>
            </div>
            <div class="preview-caption" id="previewCaption">等待预览</div>
          </div>
          <div class="mode-tabs">
            <button class="tab-button active" id="textModeBtn" type="button" onclick="window.setImageToolMode && window.setImageToolMode('text')">文生图模式</button>
            <button class="tab-button" id="imageModeBtn" type="button" onclick="window.setImageToolMode && window.setImageToolMode('image')">图生图模式</button>
          </div>
          <input id="hiddenFileInput" class="file-input-proxy" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple tabindex="-1" aria-label="选择参考图文件">
        </section>

        <section class="prompt-card" aria-label="提示词">
          <div class="prompt-head">
            <div class="reference-film" id="referenceGrid" aria-label="参考图槽位"></div>
          </div>
          <textarea id="prompt" class="prompt-box" placeholder="提示词"></textarea>
          <section class="optimizer-panel" aria-label="提示词优化">
            <div class="optimizer-head">
              <h3 class="optimizer-title">提示词优化</h3>
              <div class="optimizer-tools">
                <button class="ghost" id="optimizerSamplePromptBtn" type="button">填入示例提示词</button>
                <button class="ghost" id="optimizerSampleRefsBtn" type="button">填入示例参考</button>
                <button class="ghost" id="optimizerLabSampleBtn" type="button">填入实验室样例</button>
                <button class="ghost" id="optimizerSixTaskSamplesBtn" type="button">切换 6 类样例</button>
              </div>
            </div>
            <div class="optimizer-grid">
              <label class="optimizer-field">
                <span>task_type</span>
                <select id="optimizerTaskType">
                  <option value="text_image">text_image</option>
                  <option value="image_reference">image_reference</option>
                  <option value="character_multiview">character_multiview</option>
                  <option value="scene_multiview" selected>scene_multiview</option>
                  <option value="prop_multiview">prop_multiview</option>
                  <option value="storyboard">storyboard</option>
                </select>
              </label>
              <label class="optimizer-field">
                <span>unbound_entity</span>
                <select id="optimizerUnboundEntity">
                  <option value="warn" selected>warn</option>
                  <option value="block">block</option>
                </select>
              </label>
            </div>
            <div class="optimizer-reference-list" id="optimizerReferenceList"></div>
            <div class="optimizer-actions">
              <button class="ghost" id="addOptimizerReferenceBtn" type="button">添加 reference</button>
              <button class="primary" id="optimizePromptBtn" type="button">优化提示词</button>
            </div>
            <div class="optimizer-status" id="optimizerStatus" role="status" aria-live="polite"></div>
            <div class="optimizer-trace" id="optimizerTrace"></div>
            <ul class="optimizer-warnings" id="optimizerWarnings"></ul>
          </section>
          <div class="control-row">
            <button class="primary generate-action" id="generateBtn" type="button" onclick="window.generateImageToolNow && window.generateImageToolNow()">开始生成</button>
            <label class="select-chip control-count">
              <span>数量</span>
              <input class="compact-input" id="n" type="number" min="1" max="4" value="1">
            </label>
            <label class="select-chip control-aspect">
              <span>比例</span>
              <select id="aspectRatio" onchange="window.syncImageToolSize && window.syncImageToolSize()">
                <option value="1:1">1 : 1</option>
                <option value="4:3">4 : 3</option>
                <option value="3:4">3 : 4</option>
                <option value="16:9" selected>16 : 9</option>
                <option value="9:16">9 : 16</option>
              </select>
            </label>
            <div class="resolution-block">
              <label class="select-chip">
                <span>分辨率</span>
                <select id="size" onchange="window.syncImageToolSize && window.syncImageToolSize()">
                  <option value="auto">Auto</option>
                  <option value="1024">1K</option>
                  <option value="1536">1.5K</option>
                  <option value="2048" selected>2K</option>
                  <option value="3840">4K</option>
                </select>
              </label>
              <div class="resolution-note" id="status">实际分辨率： <span class="size-inline" id="sizePreview">2048x1152</span></div>
            </div>
            <label class="select-chip control-quality">
              <span>质量</span>
              <select id="quality">
                <option value="high">high</option>
                <option value="standard">standard</option>
              </select>
            </label>
            <label class="select-chip control-output">
              <span>格式</span>
              <select id="outputFormat">
                <option value="png">png</option>
                <option value="jpeg">jpeg</option>
                <option value="webp">webp</option>
              </select>
            </label>
            <button class="ghost clear-action" id="clearBtn" type="button">清空结果</button>
            <div class="generator-feedback" id="generatorFeedback" role="status" aria-live="polite"></div>
          </div>
        </section>
      </div>

      <aside class="history-column" id="historyColumn" aria-labelledby="history-title">
        <h2 class="section-title" id="history-title">任务历史 / 生成记录</h2>
        <div class="history-list" id="resultGrid"></div>
        <div class="history-empty" id="emptyResults">暂无生成记录</div>
        <button class="ghost" id="downloadAllBtn" type="button" disabled>下载全部返图</button>
      </aside>
    </section>
  </main>

  <div class="app-toast" id="appToast" role="status" aria-live="polite" hidden></div>

  <script>
    const MAX_REFS = 16;
    const PROMPT_PLACEHOLDER = "提示词";
    const DEFAULT_MODEL = "gpt-image-2";
    const POLL_INTERVAL_MS = 2000;
    const MAX_POLL_MS = 10 * 60 * 1000;
    const UPLOAD_TIMEOUT_MS = 120 * 1000;
    const PREVIEW_ZOOM_MIN = 0.25;
    const PREVIEW_ZOOM_MAX = 8;
    const PREVIEW_ZOOM_SENSITIVITY = 0.0015;
    const UI_STORAGE_KEY = "ai-image-tool-ui-v2";
    const PENDING_STORAGE_KEY = "ai-image-tool-pending-v2";
    const HISTORY_DB_NAME = "ai-image-tool-history-v1";
    const HISTORY_DB_VERSION = 1;
    const HISTORY_STORE_NAME = "jobs";
    const OPTIMIZER_SAMPLE_PROMPT = "生成 @萧昭宁 在 @营帐 中的现场光影多视角参考图";
    const OPTIMIZER_SAMPLE_REFERENCES = [
      {
        reference_id: "ref_char",
        entity_name: "萧昭宁",
        entity_type: "character",
        role: "character_reference",
        url: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Placeholder_view_vector.svg",

    function optimizerSelect(field, label, options, value = "") {
      const normalizedValue = value || options[0];
      const optionHtml = options.map((option) => (
        `<option value="${escapeAttribute(option)}"${option === normalizedValue ? " selected" : ""}>${escapeHtml(option)}</option>`
      )).join("");
      return `<label class="optimizer-field"><span>${label}</span><select data-reference-field="${field}">${optionHtml}</select></label>`;
    }

    function collectOptimizerReferences(options = {}) {
      const includeEmpty = Boolean(options.includeEmpty);
      const requireUrl = Boolean(options.requireUrl);
      const rows = Array.from(controls.optimizerReferenceList?.querySelectorAll(".optimizer-reference-row") || []);
      return rows.map((row, index) => {
        const get = (field) => (row.querySelector(`[data-reference-field="${field}"]`)?.value || "").trim();
        return {
          reference_id: get("reference_id"),
          entity_name: get("entity_name"),
          entity_type: get("entity_type"),
          role: get("role"),
          url: get("url"),
          mime_type: get("mime_type"),
          display_name: get("display_name"),
          description: get("description"),
          order: index + 1
        };
      }).filter((reference) => {
        if (includeEmpty) return true;
        if (requireUrl) return Boolean(reference.url);
        return reference.url || reference.entity_name || reference.reference_id || reference.description;
      });
    }

    async function optimizePrompt() {
      const originalPrompt = getPromptValue();
      try {
        if (isFileProtocol()) throw new Error(fileProtocolMessage());
        if (!originalPrompt) throw new Error("请先填写原始提示词。");
        const payload = {
          task_type: controls.optimizerTaskType.value || "scene_multiview",
          prompt: originalPrompt,
          references: collectOptimizerReferences(),
          reference_policy: {
            unbound_entity: controls.optimizerUnboundEntity.value === "block" ? "block" : "warn"
          }
        };
        setOptimizerStatus("正在优化提示词。", "busy");
        controls.optimizePromptBtn.disabled = true;
        const response = await fetch("/api/prompt-optimizer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const result = await parseJsonResponseSafe(response);
        if (!response.ok) {
          renderOptimizerResultMeta(result);
          throw new Error(result.message || "提示词优化失败，请重新优化。");
        }
        if (result.status !== "succeeded" || !result.optimized_prompt) {
          throw new Error(result.message || result.error || "提示词优化失败。");
        }
        controls.prompt.value = result.optimized_prompt;
        setOptimizerStatus("优化成功，已回填到提示词输入框。", "good");
        renderOptimizerResultMeta(result);
      } catch (error) {
        controls.prompt.value = originalPrompt;
        setOptimizerStatus(`优化失败：${errorToMessage(error)}`, "bad");
      } finally {
        controls.optimizePromptBtn.disabled = false;
      }
    }

    async function parseJsonResponseSafe(response) {
      const text = await response.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch {
        return {
          status: "failed",
          message: response.ok ? "" : "提示词优化失败，请重新优化。"
        };
      }
    }

    function isFileProtocol() {
      return window.location.protocol === "file:";
    }

    function fileProtocolMessage() {
      return "当前是 file:// 本地文件打开，无法调用上传和生成接口；请通过 http://127.0.0.1:8787/ 打开。";
