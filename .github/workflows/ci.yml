name: CI

on:
  push:
  pull_request:

jobs:
  check-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm test
      - run: npm run test:provider-config
      - run: npm run test:evidence
      - run: git diff --check
