    function normalizeUploadProgress(progress) {
      const value = progress && typeof progress === "object" ? progress : {};
      const indeterminate = Boolean(value.indeterminate);
      const percent = clampNumber(Number(value.percent || 0), 0, 100);
      return {
        label: value.label || (indeterminate ? "图床处理中" : "上传中"),
        percent,
        indeterminate
      };
    }

    function setReferenceUploadProgress(index, progress) {
      const ref = refs[index];
      if (!ref || !ref.uploading) return;
      ref.uploadProgress = {
        ...(ref.uploadProgress || {}),
        ...(progress || {})
      };
      renderReferenceSlots();
    }

    function renderReferenceSlots() {
      const grid = $("referenceGrid");
      grid.innerHTML = "";
      grid.classList.toggle("has-items", selectedRefs().length > 0);
      refs.forEach((ref, index) => {
        const isUploading = ref && ref.uploading;
        const tile = document.createElement("article");
        tile.className = [
          "asset-tile",
          isUploading ? "is-uploading" : ref ? "has-image" : "is-empty",
          activePreview && activePreview.kind === "ref" && activePreview.index === index ? "selected" : ""
        ].filter(Boolean).join(" ");

        if (isUploading) {
          const uploadProgress = normalizeUploadProgress(ref.uploadProgress);
          const progressClass = ["asset-progress", uploadProgress.indeterminate ? "is-indeterminate" : ""].filter(Boolean).join(" ");
          const progressWidth = uploadProgress.indeterminate ? 46 : uploadProgress.percent;
          tile.innerHTML = `
            <span class="asset-tooltip">${escapeHtml(uploadProgress.label)}</span>
            <div class="asset-loading" role="status" aria-label="参考图 ${index + 1} 上传中">
              <span class="asset-loading-label">${escapeHtml(uploadProgress.label)}</span>
              <span class="asset-loading-percent">${uploadProgress.indeterminate ? `${uploadProgress.percent}%+` : `${uploadProgress.percent}%`}</span>
              <i class="${progressClass}" aria-hidden="true"><b style="width: ${progressWidth}%"></b></i>
            </div>
          `;
        } else if (ref) {
          tile.innerHTML = `
            <span class="asset-tooltip">图片 ${index + 1}</span>
            <button class="asset-remove" type="button" data-remove-ref="${index}" aria-label="移除图片 ${index + 1}">×</button>
            <button class="asset-preview" type="button" data-preview-ref="${index}">
              <img alt="参考图 ${index + 1}" src="${ref.previewUrl || ref.image_url || ref.url}">
            </button>
            <span class="asset-add-badge">+</span>
          `;
        } else {
          tile.innerHTML = `
            <button class="asset-upload" type="button" data-upload-ref="${index}" aria-label="添加参考图 ${index + 1}">
              <span><span class="plus">+</span>参考内容</span>
            </button>
          `;
        }

        grid.appendChild(tile);
      });

      grid.querySelectorAll("[data-upload-ref]").forEach((button) => {
        button.addEventListener("click", () => {
          openReferencePicker(Number(button.dataset.uploadRef));
        });
      });

      grid.querySelectorAll("[data-preview-ref]").forEach((button) => {
        button.addEventListener("click", () => previewReference(Number(button.dataset.previewRef)));
      });

      grid.querySelectorAll("[data-remove-ref]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.removeRef);
          refs[index] = null;
          if (activePreview && activePreview.kind === "ref" && activePreview.index === index) setInitialPreview();
          renderReferenceSlots();
          refreshMode();
        });
      });
    }

    function openReferencePicker(index) {
      if (isFileProtocol()) {
        setStatus(fileProtocolMessage(), "bad");
        return;
      }
      const input = $("hiddenFileInput");
      if (!input) return;
      pendingReferenceUploadIndex = Number.isInteger(index) && index >= 0 && index < MAX_REFS ? index : null;
      input.multiple = true;
      input.click();
    }

    async function addReferenceFiles(files, preferredIndex = null) {
      const list = Array.from(files || []);
      for (const [fileOffset, file] of list.entries()) {
        const hasPreferredIndex = Number.isInteger(preferredIndex)
          && preferredIndex >= 0
          && preferredIndex < MAX_REFS
          && !refs[preferredIndex];
        const index = hasPreferredIndex ? preferredIndex : refs.findIndex((item) => !item);
        preferredIndex = null;
        if (index === -1) {
          setStatus("参考图槽位已满。", "bad");
          return;
        }
        await addReferenceFile(index, file, {
          current: fileOffset + 1,
          total: list.length
        });
      }
    }

    async function addReferenceFile(index, file, progress = null) {
      if (!file.type.startsWith("image/")) {
        setStatus("参考图必须是图片文件。", "bad");
        return;
      }
      refs[index] = {
        uploading: true,
        name: file.name || `图片 ${index + 1}`,
        type: file.type,
        size: file.size,
        uploadProgress: {
          label: "准备上传",
          percent: 0,
          indeterminate: false
        }
      };
      renderReferenceSlots();
      refreshMode();
      try {
        setStatus(uploadStatusText("正在上传", file, index, progress), "busy");
        const hostedImage = await uploadReferenceImage(file, (uploadProgress) => {
          setReferenceUploadProgress(index, uploadProgress);
          setStatus(uploadStatusText("正在上传", file, index, progress, uploadProgress), "busy");
        });
        const imageUrl = hostedImage.image_url || hostedImage.url || "";
        refs[index] = {
          file: null,
          referenceId: hostedImage.referenceId || "",
          name: hostedImage.name || file.name || `reference-${index + 1}.${extensionFromMime(file.type)}`,
          type: hostedImage.type || file.type,
          size: hostedImage.size || file.size,
          previewUrl: imageUrl,
          url: imageUrl,
          image_url: imageUrl,
          host: hostedImage.host || ""
        };
        previewReference(index);
        renderReferenceSlots();
        refreshMode();
        setStatus(uploadStatusText("已添加", file, index, progress), "good");
      } catch (error) {
        refs[index] = null;
        renderReferenceSlots();
        refreshMode();
        const prefix = progress && progress.total > 1 ? `第 ${progress.current}/${progress.total} 张` : "参考图";
        setStatus(`${prefix}上传失败：${errorToMessage(error)}`, "bad");
      }
    }

    async function uploadReferenceImage(file, onProgress = null) {
      if (isFileProtocol()) {
        throw new Error(fileProtocolMessage());
      }
      const form = new FormData();
      form.append("image", file, file.name || "reference.png");
      form.append("name", file.name || "reference");
      return xhrUploadReferenceImage(form, onProgress);
    }

    function xhrUploadReferenceImage(form, onProgress = null) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let settled = false;
        let timeoutTriggered = false;
        const timer = window.setTimeout(() => {
          timeoutTriggered = true;
          xhr.abort();
          finishReject(new Error(`参考图上传超过 ${Math.round(UPLOAD_TIMEOUT_MS / 1000)} 秒，请检查图床配置或切换更稳定的上传方式。`));
        }, UPLOAD_TIMEOUT_MS);

        const report = (progress) => {
          if (typeof onProgress === "function") onProgress(progress);
        };

        xhr.open("POST", "/api/reference-images");
        xhr.upload.addEventListener("progress", (event) => {
          if (!event.lengthComputable || !event.total) {
            report({ label: "上传中", percent: 12, indeterminate: true });
            return;
          }
          const localPercent = Math.min(90, Math.max(1, Math.round((event.loaded / event.total) * 90)));
          if (event.loaded >= event.total) {
            report({ label: "图床处理中", percent: 90, indeterminate: true });
          } else {
            report({ label: "上传中", percent: localPercent, indeterminate: false });
          }
        });
        xhr.addEventListener("load", () => {
          try {
            const payload = parseJsonTextResponse(xhr.status, xhr.statusText, xhr.responseText);
            if (!payload || !payload.image_url) {
              throw new Error("图床没有返回图片 URL。");
            }
            report({ label: "上传完成", percent: 100, indeterminate: false });
            finishResolve(payload);
          } catch (error) {
            finishReject(error);
          }
        });
        xhr.addEventListener("error", () => finishReject(new Error("参考图上传失败，请检查网络或图床配置。")));
        xhr.addEventListener("abort", () => {
          if (timeoutTriggered) return;
          finishReject(new Error("参考图上传已中断。"));
        });
        report({ label: "上传中", percent: 1, indeterminate: false });
        xhr.send(form);

        function finishResolve(value) {
          if (settled) return;
          settled = true;
          window.clearTimeout(timer);
          resolve(value);
        }

        function finishReject(error) {
          if (settled) return;
          settled = true;
          window.clearTimeout(timer);
          reject(error);
        }
      });
    }

    function selectedRefs() {
      return refs.filter((ref) => ref && !ref.uploading && (ref.image_url || ref.url));
    }

    function refreshMode() {
      const count = selectedRefs().length;
      const isImageMode = preferredMode === "image" || count > 0;
      document.querySelector(".prompt-card")?.classList.toggle("image-mode", isImageMode);
      controls.modeChip.textContent = isImageMode ? "图生图" : "文生图";
      controls.refCountText.textContent = `${count} / ${MAX_REFS} 参考图`;
      $("textModeBtn").classList.toggle("active", !isImageMode);
      $("imageModeBtn").classList.toggle("active", isImageMode);
    }

    function setInitialPreview() {
      const firstJob = jobs[0];
      const firstRefIndex = refs.findIndex((ref) => ref && !ref.uploading && (ref.image_url || ref.url));
      if (firstJob) {
        previewJob(firstJob.jobId);
      } else if (firstRefIndex !== -1) {
        previewReference(firstRefIndex);
      } else {
        activePreview = null;
        controls.mainPreviewImage.hidden = true;
        controls.mainPreviewImage.removeAttribute("src");
        controls.previewPlaceholder.hidden = false;
        controls.previewPlaceholder.innerHTML = `<div><strong>预览窗</strong><span>上传参考图或生成图片后，点击任意图片在这里查看。</span></div>`;
        controls.previewCaption.textContent = "等待预览";
        controls.downloadPreviewBtn.disabled = true;
        renderReferenceSlots();
        renderJobs();
      }
    }

    function previewReference(index) {
      const ref = refs[index];
      if (!ref || ref.uploading || (!ref.previewUrl && !ref.image_url && !ref.url)) return;
      activePreview = {
        kind: "ref",
        index,
        src: ref.previewUrl || ref.image_url || ref.url,
        name: ref.name,
        download: ref.previewUrl || ref.image_url || ref.url
      };
      updatePreview();
    }

    function previewJob(jobId, imageIndex = 0) {
      const job = jobs.find((item) => item.jobId === jobId);
      if (!job) return;
      const image = job.images && job.images[imageIndex];
      activePreview = {
        kind: "job",
        jobId,
        imageIndex,
        status: job.status,
        src: image ? imageToSrc(image) : "",
        name: image ? imageName(job, imageIndex, image) : `${statusLabel(job.status)} · ${shortJob(job.jobId)}`,
        download: image ? imageToSrc(image) : ""
      };
      updatePreview();
    }

    function updatePreview() {
      if (!activePreview) return;
      if (activePreview.kind === "job" && !activePreview.src) {
        const job = jobs.find((item) => item.jobId === activePreview.jobId);
        controls.mainPreviewImage.hidden = true;
        controls.mainPreviewImage.removeAttribute("src");
        resetPreviewZoom();
        controls.previewPlaceholder.hidden = false;
        controls.previewPlaceholder.innerHTML = `<div><strong>${escapeHtml(statusLabel(job && job.status))}</strong><span>${escapeHtml(job && job.error ? job.error : job ? job.prompt : "任务状态更新中")}</span></div>`;
        controls.previewCaption.textContent = `${statusLabel(job && job.status)} · ${job ? shortJob(job.jobId) : "任务"}`;
        controls.downloadPreviewBtn.disabled = true;
      } else {
        controls.mainPreviewImage.src = activePreview.src;
        controls.mainPreviewImage.hidden = false;
        controls.previewPlaceholder.hidden = true;
        controls.previewCaption.textContent = `${activePreview.kind === "ref" ? "参考图" : "返图"} · ${activePreview.name}`;
        controls.downloadPreviewBtn.disabled = false;
        schedulePreviewZoomReset();
      }
      renderReferenceSlots();
      renderJobs();
    }

    async function createImageJob() {
      let pendingJob = null;
      try {
        if (isFileProtocol()) throw new Error(fileProtocolMessage());
        const request = buildJobRequest();
        validateJobRequest(request);
        pendingJob = createPendingJob(request);
        upsertJob(pendingJob);
        renderJobs();
        previewJob(pendingJob.jobId);
        setBusy(true);
        setStatus("正在调用最终生图 API。", "busy");
        const finalApiEndpoint = "/api/v1/image-generations";
        const response = await fetch(finalApiEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(request)
        });
        const networkEvent = {
          method: "POST",
          endpoint: finalApiEndpoint,
          status: response.status,
          ok: response.ok
        };
        window.__finalImageApiNetworkEvents = [
          ...(Array.isArray(window.__finalImageApiNetworkEvents) ? window.__finalImageApiNetworkEvents : []),
          networkEvent
        ].slice(-20);
        document.documentElement.dataset.finalImageApiNetwork = JSON.stringify(networkEvent);
        console.info("[final-image-api-network]", JSON.stringify(networkEvent));
        const payload = await parseJsonResponseForJob(response);
        const job = normalizeJob(payload, request);
        removeJob(pendingJob.jobId);
        upsertJob(job);
        renderJobs();
        previewJob(job.jobId);
        setStatus(job.status === "succeeded" ? "生成完成。" : `生成失败：${job.error || "未知错误"}`, job.status === "succeeded" ? "good" : "bad");
      } catch (error) {
        const message = errorToMessage(error);
        if (pendingJob) {
          pendingJob.status = "failed";
          pendingJob.error = message;
          pendingJob.updatedAt = Date.now();
          upsertJob(pendingJob);
          renderJobs();
          previewJob(pendingJob.jobId);
        }
        setStatus(`生成失败：${message}`, "bad");
      } finally {
        setBusy(false);
      }
    }

    function createPendingJob(request) {
      const now = Date.now();
      return {
        jobId: `pending_${now}`,
        prompt: request.prompt,
        fill: buildJobFillSnapshot(request),
        status: "running",
        images: [],
        error: null,
        createdAt: now,
        updatedAt: now
      };
    }

    function uploadStatusText(action, file, index, progress = null, phaseProgress = null) {
      const sequence = progress && progress.total > 1 ? `第 ${progress.current}/${progress.total} 张` : `图片 ${index + 1}`;
      const stage = phaseProgress
        ? `${phaseProgress.label || action}${phaseProgress.indeterminate ? `，${phaseProgress.percent}%+` : `，${phaseProgress.percent}%`}`
        : action;
      const name = file.name || `图片 ${index + 1}`;
      const size = formatFileSize(file.size);
      return `${sequence} ${stage}：${name}${size ? `（${size}）` : ""}。`;
    }

    function buildJobRequest() {
      const prompt = getPromptValue();
      const refList = selectedRefs();
      const structuredReferences = collectOptimizerReferences({ requireUrl: true });
      const hasReferenceUrls = structuredReferences.some((reference) => /^https?:\/\//i.test(reference.url));
      return {
        prompt,
        model: DEFAULT_MODEL,
        task_type: controls.optimizerTaskType.value || "image_reference",
        mode: preferredMode === "image" || refList.length || hasReferenceUrls ? "image" : "text",
        size: computeSize(),
        quality: controls.quality.value || "high",
        output_format: controls.outputFormat.value || "png",
        n: clampNumber(Number(controls.n.value || 1), 1, 4),
        reference_policy: {
          unbound_entity: controls.optimizerUnboundEntity.value === "block" ? "block" : "warn"
        },
        output: {
          count: clampNumber(Number(controls.n.value || 1), 1, 4),
          aspect_ratio: controls.aspectRatio.value || "16:9",
          quality: controls.quality.value || "high",
          return_format: "url",
          language: "zh-CN"
        },
        references: structuredReferences,
        images: refList.map((ref) => ({
          referenceId: ref.referenceId || "",
          name: ref.name,
          type: ref.type,
          size: ref.size,
          image_url: ref.image_url || ref.url || ""
        }))
      };
    }

    function buildJobFillSnapshot(request) {
      return {
        prompt: request.prompt,
        mode: request.mode,
        aspectRatio: controls.aspectRatio.value,
        sizeControl: controls.size.value,
        size: request.size,
        quality: request.quality,
        output_format: request.output_format,
        n: request.n,
        references: Array.isArray(request.references) ? request.references.map((reference) => ({
          reference_id: reference.reference_id || "",
          entity_name: reference.entity_name || "",
          entity_type: reference.entity_type || "",
          role: reference.role || "",
          url: reference.url || "",
          mime_type: reference.mime_type || "",
          display_name: reference.display_name || "",
          description: reference.description || ""
        })) : [],
        images: Array.isArray(request.images) ? request.images.map((image) => ({
          referenceId: image.referenceId || "",
          name: image.name,
          type: image.type,
          size: image.size,
          image_url: image.image_url || image.url || ""
        })) : []
      };
    }

    function validateJobRequest(request) {
      if (!request.prompt) throw new Error("请填写提示词。");
      const hasUrlReferences = Array.isArray(request.references) && request.references.some((reference) => /^https?:\/\//i.test(reference.url || ""));
      if (request.task_type === "text_image" && hasUrlReferences) {
        throw new Error("text_image 不允许填写 references。");
      }
      if (request.task_type === "image_reference" && !hasUrlReferences && request.images.length === 0) {
        throw new Error("图生图模式请先上传参考图或填写 reference URL。");
      }
      if (request.mode === "image" && request.images.some((image) => !image.image_url)) {
        throw new Error("上传槽位参考图需要先得到可访问 URL。");
      }
      if (Array.isArray(request.references) && request.references.some((reference) => reference.url && !/^https?:\/\//i.test(reference.url))) {
        throw new Error("references[].url 只支持 http 或 https URL。");
      }
    }

    async function pollJob(jobId, options = {}) {
      const existing = pollers.get(jobId);
      if (existing) window.clearTimeout(existing.timer);
      const startedAt = existing ? existing.startedAt : Date.now();
      const run = async () => {
        try {
          const response = await fetch(`/api/image-jobs/${encodeURIComponent(jobId)}`, { cache: "no-store" });
          if (response.status === 403 || response.status === 404) {
            markJobFailed(jobId, response.status === 403 ? "无权查看该任务。" : "任务不存在或已过期。");
            removePendingJob(jobId);
            pollers.delete(jobId);
            return;
          }
          const payload = await parseJsonResponse(response);
          const job = normalizeJob(payload);
          upsertJob(job);
          if (activePreview && activePreview.kind === "job" && activePreview.jobId === jobId) previewJob(jobId);
          renderJobs();

          if (job.status === "succeeded" || job.status === "failed") {
            removePendingJob(jobId);
            pollers.delete(jobId);
            setStatus(job.status === "succeeded" ? "生成完成。" : `生成失败：${job.error || "未知错误"}`, job.status === "succeeded" ? "good" : "bad");
            return;
          }

          if (Date.now() - startedAt > MAX_POLL_MS) {
            setStatus("任务仍在后台运行，可稍后刷新查看。", "busy");
            pollers.delete(jobId);
            return;
          }

          const timer = window.setTimeout(run, POLL_INTERVAL_MS);
          pollers.set(jobId, { timer, startedAt });
        } catch (error) {
          const timer = window.setTimeout(run, POLL_INTERVAL_MS);
          pollers.set(jobId, { timer, startedAt });
          setStatus(`任务状态刷新失败，正在重试：${errorToMessage(error)}`, "busy");
        }
      };

      if (options.immediate) {
        await run();
      } else {
        const timer = window.setTimeout(run, POLL_INTERVAL_MS);
        pollers.set(jobId, { timer, startedAt });
      }
    }

    async function restorePendingJobs() {
      const ids = readPendingJobIds();
      if (!ids.length) return;
      setStatus("正在恢复未完成任务。", "busy");
      for (const jobId of ids) {
        try {
          const response = await fetch(`/api/image-jobs/${encodeURIComponent(jobId)}`, { cache: "no-store" });
          if (!response.ok) {
            removePendingJob(jobId);
            continue;
          }
          const job = normalizeJob(await response.json());
          upsertJob(job);
          if (job.status === "queued" || job.status === "running") pollJob(job.jobId);
          else removePendingJob(job.jobId);
        } catch {
          pollJob(jobId);
        }
      }
      renderJobs();
      setInitialPreview();
    }

    function normalizeJob(payload, request = {}) {
      const fill = payload.fill || payload.request || (request.prompt ? buildJobFillSnapshot(request) : null);
      const jobId = payload.jobId || payload.generation_id || payload.request_id || `job_${Date.now()}`;
      const errorMessage = payload.error || payload.message || payload.error_code || null;
      return {
        jobId,
        prompt: payload.prompt || payload.input?.prompt || request.prompt || "",
        fill,
        status: payload.status || (payload.images && payload.images.length ? "succeeded" : "failed"),
        images: Array.isArray(payload.images) ? payload.images : [],
        error: errorMessage,
        createdAt: payload.createdAt || Date.now(),
        updatedAt: payload.updatedAt || Date.now()
      };
    }

    function upsertJob(job) {
      const index = jobs.findIndex((item) => item.jobId === job.jobId);
      if (index === -1) jobs.unshift(job);
      else jobs[index] = { ...jobs[index], ...job, fill: job.fill || jobs[index].fill || null };
      if (job.status === "queued" || job.status === "running") addPendingJob(job.jobId);
      persistJob(job.jobId);
    }

    function removeJob(jobId) {
      const index = jobs.findIndex((item) => item.jobId === jobId);
      if (index !== -1) jobs.splice(index, 1);
      removePendingJob(jobId);
      try {
        localStorage.removeItem(`${JOB_STORAGE_PREFIX}${jobId}`);
      } catch {
        // Ignore localStorage cleanup failures.
      }
    }

    function markJobFailed(jobId, message) {
      const job = jobs.find((item) => item.jobId === jobId);
      if (!job) return;
      job.status = "failed";
      job.error = message;
      job.updatedAt = Date.now();
      persistJob(job.jobId);
      if (activePreview && activePreview.kind === "job" && activePreview.jobId === jobId) previewJob(jobId);
      renderJobs();
    }

    function renderJobs() {
      controls.resultGrid.innerHTML = "";
      controls.emptyResults.hidden = jobs.length > 0;
      $("clearBtn").hidden = jobs.length === 0;
      const hasDownloadableImages = jobs.some((job) => job.status === "succeeded" && job.images.length);
      controls.downloadAllBtn.disabled = !hasDownloadableImages;
      controls.downloadAllBtn.hidden = !hasDownloadableImages;

      jobs.forEach((job) => {
        const selected = activePreview && activePreview.kind === "job" && activePreview.jobId === job.jobId;
        const card = document.createElement("article");
        card.className = ["history-card", job.status, selected ? "selected" : ""].filter(Boolean).join(" ");
        const images = Array.isArray(job.images) ? job.images : [];
        const image = images[0];
        const thumb = image
          ? `<img alt="生成图片" src="${imageToSrc(image)}">`
          : `<span>${escapeHtml(statusLabel(job.status))}</span>`;
        const action = image
          ? `<button type="button" data-download-job="${escapeHtml(job.jobId)}" data-download-image="0">下载</button>`
          : `<span>${escapeHtml(job.error || "等待返图")}</span>`;
        const variants = images.length > 1
          ? `<div class="history-variants" aria-label="${escapeHtml(shortJob(job.jobId))} 的全部返图">
              ${images.map((item, index) => `
                <button class="history-variant" type="button" data-preview-job="${escapeHtml(job.jobId)}" data-preview-image="${index}" title="预览第 ${index + 1} 张返图">
                  <img alt="第 ${index + 1} 张返图" src="${imageToSrc(item)}">
                </button>
              `).join("")}
            </div>`
          : "";
        card.innerHTML = `
          <button class="history-thumb ${image ? "" : "status-thumb"}" type="button" data-preview-job="${escapeHtml(job.jobId)}">
            ${thumb}
          </button>
          <div>
            <div class="history-title" title="${escapeHtml(job.prompt)}">${escapeHtml(job.prompt || "未命名任务")}</div>
            <div class="history-meta">
              <span class="avatar">${escapeHtml(statusShort(job.status))}</span>
              <span>${escapeHtml(statusLabel(job.status))}</span>
              <span>${escapeHtml(shortJob(job.jobId))}</span>
              ${images.length ? `<span class="history-count">${images.length} 张返图</span>` : ""}
            </div>
          </div>
          <button class="more" type="button" data-fill-job="${escapeHtml(job.jobId)}" title="回填这条生成信息" aria-label="回填这条生成信息">···</button>
          ${variants}
          <div class="history-actions">
            ${action}
            <button type="button" data-remove-job="${escapeHtml(job.jobId)}">移除</button>
          </div>
        `;
        controls.resultGrid.appendChild(card);
      });

      controls.resultGrid.querySelectorAll("[data-preview-job]").forEach((button) => {
        button.addEventListener("click", () => previewJob(button.dataset.previewJob, Number(button.dataset.previewImage || 0)));
      });

      controls.resultGrid.querySelectorAll("[data-fill-job]").forEach((button) => {
        button.addEventListener("click", () => fillFromHistoryJob(button.dataset.fillJob));
      });

      controls.resultGrid.querySelectorAll("[data-download-job]").forEach((button) => {
        button.addEventListener("click", () => downloadJobImage(button.dataset.downloadJob, Number(button.dataset.downloadImage || 0)));
      });

      controls.resultGrid.querySelectorAll("[data-remove-job]").forEach((button) => {
        button.addEventListener("click", () => removeJob(button.dataset.removeJob));
      });
    }

    function fillFromHistoryJob(jobId) {
      const job = jobs.find((item) => item.jobId === jobId);
      if (!job) return;
      const fill = job.fill || {
        prompt: job.prompt,
        mode: "text",
        images: []
      };

      controls.prompt.value = fill.prompt || job.prompt || "";
      controls.aspectRatio.value = optionValueOrCurrent(controls.aspectRatio, fill.aspectRatio);
      controls.size.value = optionValueOrCurrent(controls.size, fill.sizeControl || sizeControlFromComputed(fill.size));
      controls.quality.value = optionValueOrCurrent(controls.quality, fill.quality);
      controls.outputFormat.value = optionValueOrCurrent(controls.outputFormat, fill.output_format);
      controls.n.value = String(clampNumber(Number(fill.n || 1), 1, 4));

      refs.fill(null);
      const images = Array.isArray(fill.images) ? fill.images.slice(0, MAX_REFS) : [];
      images.forEach((image, index) => {
        if (!image || (!image.image_url && !image.url)) return;
        const imageUrl = image.image_url || image.url || "";
        refs[index] = {
          file: null,
          referenceId: image.referenceId || "",
          name: image.name || `reference-${index + 1}.${extensionFromMime(image.type || "image/png")}`,
          type: image.type || "image/png",
          size: image.size || 0,
          previewUrl: imageUrl,
          url: imageUrl,
          image_url: imageUrl,
          host: image.host || ""
        };
      });

      preferredMode = fill.mode === "image" || images.length ? "image" : "text";
      updateSizePreview();
      persistUiOptions();
      renderReferenceSlots();
      refreshMode();
      if (images.length) previewReference(0);
      setStatus(`已回填生成信息：${job.prompt || "未命名任务"}。`, "good");
    }

    function optionValueOrCurrent(control, value) {
      const stringValue = value === undefined || value === null ? "" : String(value);
      if (!stringValue) return control.value;
      return Array.from(control.options || []).some((option) => option.value === stringValue)
        ? stringValue
        : control.value;
    }

    function sizeControlFromComputed(size) {
      const value = String(size || "");
      if (!value || value === "auto") return "auto";
      const match = value.match(/^(\d{2,5})x(\d{2,5})$/);
      if (!match) return "";
      const longEdge = String(Math.max(Number(match[1]), Number(match[2])));
      return Array.from(controls.size.options || []).some((option) => option.value === longEdge) ? longEdge : "";
    }

    async function removeJob(jobId) {
      const index = jobs.findIndex((job) => job.jobId === jobId);
      if (index === -1) return;
      jobs.splice(index, 1);
      removePendingJob(jobId);
      const poller = pollers.get(jobId);
      if (poller) window.clearTimeout(poller.timer);
      pollers.delete(jobId);
      await deletePersistedJob(jobId);
      if (activePreview && activePreview.kind === "job" && activePreview.jobId === jobId) setInitialPreview();
      renderJobs();
    }

    async function clearResults() {
      jobs.splice(0, jobs.length);
      pollers.forEach((poller) => window.clearTimeout(poller.timer));
      pollers.clear();
      localStorage.removeItem(PENDING_STORAGE_KEY);
      await clearPersistedJobs();
      setInitialPreview();
      renderJobs();
      setStatus("结果已清空。", "good");
    }

    function removeAllRefs(options = {}) {
      refs.fill(null);
      if (!options.keepMode) preferredMode = "text";
      if (activePreview && activePreview.kind === "ref") setInitialPreview();
      renderReferenceSlots();
      refreshMode();
      if (!options.silent) setStatus("参考图已移除。", "good");
    }

    function downloadActivePreview() {
      if (!activePreview || !activePreview.download) return;
      downloadImageSource(activePreview.download, activePreview.name || "preview.png");
    }

    function downloadJobImage(jobId, imageIndex = 0) {
      const job = jobs.find((item) => item.jobId === jobId);
      const image = job && job.images && job.images[imageIndex];
      if (!job || !image) {
        setStatus("当前任务没有可下载的返图。", "bad");
        return;
      }
      downloadImageSource(imageToSrc(image), imageName(job, imageIndex, image));
    }

    function downloadImageSource(source, filename) {
      if (!source) {
        setStatus("当前预览没有可下载图片。", "bad");
        return;
      }

      if (/^https?:\/\//i.test(source)) {
        triggerDownload(source, filename, { external: true });
        return;
      }

      if (/^data:/i.test(source)) {
        try {
          const objectUrl = dataUrlToObjectUrl(source);
          triggerDownload(objectUrl, filename);
          window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
          return;
        } catch (error) {
          setStatus(`下载准备失败：${errorToMessage(error)}`, "bad");
          return;
        }
      }

      triggerDownload(source, filename);
    }

    function triggerDownload(href, filename, options = {}) {
      const link = document.createElement("a");
      link.href = href;
      link.download = safeFilename(filename || "preview.png");
      if (options.external) {
        link.target = "_blank";
        link.rel = "noreferrer";
      }
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function dataUrlToObjectUrl(dataUrl) {
      const match = String(dataUrl).match(/^data:([^;,]+)?(;base64)?,(.*)$/);
      if (!match) throw new Error("图片数据格式无效。");
      const mime = match[1] || "application/octet-stream";
      const isBase64 = Boolean(match[2]);
      const payload = match[3] || "";
      let bytes;
      if (isBase64) {
        const binary = atob(payload.replace(/\s/g, ""));
        bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
      } else {
        const decoded = decodeURIComponent(payload);
        bytes = new TextEncoder().encode(decoded);
      }
      return URL.createObjectURL(new Blob([bytes], { type: mime }));
    }

    async function togglePreviewFullscreen() {
      if (!controls.previewStage) return;
      try {
        if (isPreviewFullscreen()) {
          if (previewImmersiveFallback) exitPreviewFallbackMode();
          else await exitFullscreen();
        } else {
          await requestFullscreen(controls.previewStage);
        }
        syncFullscreenButton();
      } catch (error) {
        enterPreviewFallbackMode();
        syncFullscreenButton();
      }
    }

    function syncFullscreenButton() {
      if (!controls.fullscreenPreviewBtn) return;
      const active = isPreviewFullscreen();
      controls.fullscreenPreviewBtn.textContent = active ? "×" : "⛶";
      controls.fullscreenPreviewBtn.title = active ? "退出全屏" : "全屏预览";
      controls.fullscreenPreviewBtn.setAttribute("aria-label", active ? "退出全屏" : "全屏预览");
      controls.fullscreenPreviewBtn.classList.toggle("active", active);
      controls.previewStage.classList.toggle("is-fullscreen-preview", active);
      controls.previewStage.classList.toggle("is-immersive-preview", active && previewImmersiveFallback);
      if (!active) {
        endPreviewDrag();
        resetPreviewZoom();
      } else {
        schedulePreviewZoomReset();
      }
    }

    function isPreviewFullscreen() {
      return fullscreenElement() === controls.previewStage || previewImmersiveFallback;
    }

    function fullscreenElement() {
      return document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.mozFullScreenElement ||
        document.msFullscreenElement ||
        null;
    }

    function requestFullscreen(element) {
      const request = element.requestFullscreen ||
        element.webkitRequestFullscreen ||
        element.mozRequestFullScreen ||
        element.msRequestFullscreen;
      if (!request) return Promise.reject(new Error("当前浏览器不支持预览全屏。"));
      const result = request.call(element);
      return result && typeof result.then === "function" ? result : Promise.resolve();
    }

    function exitFullscreen() {
      const exit = document.exitFullscreen ||
        document.webkitExitFullscreen ||
        document.mozCancelFullScreen ||
        document.msExitFullscreen;
      if (!exit) return Promise.reject(new Error("当前浏览器不支持退出全屏。"));
      const result = exit.call(document);
      return result && typeof result.then === "function" ? result : Promise.resolve();
    }

    function enterPreviewFallbackMode() {
      if (previewImmersiveFallback) return;
      previewImmersiveFallback = true;
      previewScrollLock = {
        htmlOverflow: document.documentElement.style.overflow,
        bodyOverflow: document.body.style.overflow
      };
      document.documentElement.style.overflow = "hidden";
      document.body.style.overflow = "hidden";
      schedulePreviewZoomReset();
    }

    function exitPreviewFallbackMode() {
      if (!previewImmersiveFallback) return;
      previewImmersiveFallback = false;
      if (previewScrollLock) {
        document.documentElement.style.overflow = previewScrollLock.htmlOverflow;
        document.body.style.overflow = previewScrollLock.bodyOverflow;
      }
      previewScrollLock = null;
      controls.previewStage.classList.remove("is-immersive-preview");
      endPreviewDrag();
      resetPreviewZoom();
    }

    function handlePreviewImageLoad() {
      if (isPreviewFullscreen()) {
        schedulePreviewZoomReset();
      }
    }

    function handlePreviewImageError() {
      resetPreviewZoom();
    }

    function schedulePreviewZoomReset() {
      window.requestAnimationFrame(() => {
        if (isPreviewFullscreen() && controls.mainPreviewImage && !controls.mainPreviewImage.hidden && controls.mainPreviewImage.naturalWidth > 0) {
          syncPreviewZoomState({ forceReset: true });
        }
      });
    }

    function resetPreviewZoom() {
      previewZoom.ready = false;
      previewZoom.scale = 1;
      previewZoom.panX = 0;
      previewZoom.panY = 0;
      previewZoom.naturalWidth = 0;
      previewZoom.naturalHeight = 0;
      previewZoom.stageWidth = 0;
      previewZoom.stageHeight = 0;
      previewZoom.dragActive = false;
      previewZoom.dragStartX = 0;
      previewZoom.dragStartY = 0;
      previewZoom.dragPanX = 0;
      previewZoom.dragPanY = 0;
      controls.mainPreviewImage.style.transform = "";
      controls.mainPreviewImage.style.width = "";
      controls.mainPreviewImage.style.height = "";
      controls.mainPreviewImage.style.left = "";
      controls.mainPreviewImage.style.top = "";
      controls.mainPreviewImage.style.maxWidth = "";
      controls.mainPreviewImage.style.maxHeight = "";
      controls.mainPreviewImage.style.objectFit = "";
      controls.mainPreviewImage.style.pointerEvents = "";
      controls.previewStage.classList.remove("is-dragging");
    }

    function syncPreviewZoomState(options = {}) {
      if (!isPreviewFullscreen() || !controls.mainPreviewImage || controls.mainPreviewImage.hidden || !controls.mainPreviewImage.src || !controls.mainPreviewImage.naturalWidth || !controls.mainPreviewImage.naturalHeight) {
        resetPreviewZoom();
        return;
      }

      const stageWidth = controls.previewStage.clientWidth || controls.previewStage.getBoundingClientRect().width || 1;
      const stageHeight = controls.previewStage.clientHeight || controls.previewStage.getBoundingClientRect().height || 1;
      const naturalWidth = controls.mainPreviewImage.naturalWidth;
      const naturalHeight = controls.mainPreviewImage.naturalHeight;

      if (!previewZoom.ready || options.forceReset) {
        const fitScale = Math.min(stageWidth / naturalWidth, stageHeight / naturalHeight);
        const scale = clampNumber(fitScale, PREVIEW_ZOOM_MIN, PREVIEW_ZOOM_MAX);
        const position = constrainPreviewPan(scale, (stageWidth - naturalWidth * scale) / 2, (stageHeight - naturalHeight * scale) / 2, naturalWidth, naturalHeight, stageWidth, stageHeight);
        previewZoom.scale = scale;
        previewZoom.panX = position.x;
        previewZoom.panY = position.y;
      } else {
        const position = constrainPreviewPan(previewZoom.scale, previewZoom.panX, previewZoom.panY, naturalWidth, naturalHeight, stageWidth, stageHeight);
        previewZoom.panX = position.x;
        previewZoom.panY = position.y;
      }

      previewZoom.ready = true;
      previewZoom.naturalWidth = naturalWidth;
      previewZoom.naturalHeight = naturalHeight;
      previewZoom.stageWidth = stageWidth;
      previewZoom.stageHeight = stageHeight;

      controls.mainPreviewImage.style.position = "absolute";
      controls.mainPreviewImage.style.left = "0";
      controls.mainPreviewImage.style.top = "0";
      controls.mainPreviewImage.style.width = `${naturalWidth}px`;
      controls.mainPreviewImage.style.height = `${naturalHeight}px`;
      controls.mainPreviewImage.style.maxWidth = "none";
      controls.mainPreviewImage.style.maxHeight = "none";
      controls.mainPreviewImage.style.objectFit = "initial";
      controls.mainPreviewImage.style.pointerEvents = "none";
      controls.mainPreviewImage.style.transformOrigin = "top left";
      controls.mainPreviewImage.style.transform = `translate(${previewZoom.panX}px, ${previewZoom.panY}px) scale(${previewZoom.scale})`;
      controls.previewStage.classList.add("is-fullscreen-preview");
    }

    function constrainPreviewPan(scale, panX, panY, naturalWidth = previewZoom.naturalWidth, naturalHeight = previewZoom.naturalHeight, stageWidth = previewZoom.stageWidth, stageHeight = previewZoom.stageHeight) {
      const renderedWidth = naturalWidth * scale;
      const renderedHeight = naturalHeight * scale;
      let x = panX;
      let y = panY;
      if (renderedWidth <= stageWidth) x = (stageWidth - renderedWidth) / 2;
      else x = Math.min(0, Math.max(stageWidth - renderedWidth, x));
      if (renderedHeight <= stageHeight) y = (stageHeight - renderedHeight) / 2;
      else y = Math.min(0, Math.max(stageHeight - renderedHeight, y));
      return { x, y };
    }

    function handlePreviewWheel(event) {
      if (!isPreviewFullscreen() || !activePreview || !activePreview.src || !previewZoom.ready) return;
      event.preventDefault();
      const stageRect = controls.previewStage.getBoundingClientRect();
      const pointerX = event.clientX - stageRect.left;
      const pointerY = event.clientY - stageRect.top;
      const zoomFactor = Math.exp(-event.deltaY * PREVIEW_ZOOM_SENSITIVITY);
      const nextScale = clampNumber(previewZoom.scale * zoomFactor, PREVIEW_ZOOM_MIN, PREVIEW_ZOOM_MAX);
      const contentX = (pointerX - previewZoom.panX) / previewZoom.scale;
      const contentY = (pointerY - previewZoom.panY) / previewZoom.scale;
      const nextPanX = pointerX - contentX * nextScale;
      const nextPanY = pointerY - contentY * nextScale;
      const position = constrainPreviewPan(nextScale, nextPanX, nextPanY);
      previewZoom.scale = nextScale;
      previewZoom.panX = position.x;
      previewZoom.panY = position.y;
      applyPreviewZoomTransform();
    }

    function handlePreviewPointerDown(event) {
      if (!isPreviewFullscreen() || !activePreview || !activePreview.src || !previewZoom.ready || event.button !== 0) return;
      event.preventDefault();
      previewZoom.dragActive = true;
      previewZoom.dragStartX = event.clientX;
      previewZoom.dragStartY = event.clientY;
      previewZoom.dragPanX = previewZoom.panX;
      previewZoom.dragPanY = previewZoom.panY;
      controls.previewStage.classList.add("is-dragging");
      try {
        controls.previewStage.setPointerCapture(event.pointerId);
      } catch {
        // Ignore pointer capture failures and continue with mouse move events.
      }
    }

    function handlePreviewPointerMove(event) {
      if (!previewZoom.dragActive || !isPreviewFullscreen() || !activePreview || !activePreview.src || !previewZoom.ready) return;
      event.preventDefault();
      const deltaX = event.clientX - previewZoom.dragStartX;
      const deltaY = event.clientY - previewZoom.dragStartY;
      const position = constrainPreviewPan(
        previewZoom.scale,
        previewZoom.dragPanX + deltaX,
        previewZoom.dragPanY + deltaY
      );
      previewZoom.panX = position.x;
      previewZoom.panY = position.y;
      applyPreviewZoomTransform();
    }

    function endPreviewDrag(event) {
      if (event && event.pointerId != null && controls.previewStage && controls.previewStage.hasPointerCapture && controls.previewStage.hasPointerCapture(event.pointerId)) {
        try {
          controls.previewStage.releasePointerCapture(event.pointerId);
        } catch {
          // Ignore release errors.
        }
      }
      previewZoom.dragActive = false;
      controls.previewStage.classList.remove("is-dragging");
    }

    function applyPreviewZoomTransform() {
      if (!isPreviewFullscreen() || !activePreview || !activePreview.src || !previewZoom.ready) return;
      controls.mainPreviewImage.style.transform = `translate(${previewZoom.panX}px, ${previewZoom.panY}px) scale(${previewZoom.scale})`;
    }

    function downloadAllResults() {
      let index = 0;
      jobs.forEach((job) => {
        if (job.status !== "succeeded") return;
        job.images.forEach((image, imageIndex) => {
          const href = imageToSrc(image);
          if (!href) return;
          setTimeout(() => {
            downloadImageSource(href, imageName(job, imageIndex, image));
          }, index * 160);
          index += 1;
        });
      });
    }

    async function restorePersistedJobs() {
      try {
        const storedJobs = await loadPersistedJobs();
        jobs.splice(0, jobs.length, ...storedJobs);
      } catch (error) {
        console.warn("[image-tool] restore history failed", errorToMessage(error));
      }
    }

    async function loadPersistedJobs() {
      const db = await openHistoryDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction(HISTORY_STORE_NAME, "readonly")
          .objectStore(HISTORY_STORE_NAME)
          .getAll();
        request.onsuccess = () => {
          const items = Array.isArray(request.result) ? request.result : [];
          resolve(items
            .map((item) => normalizeStoredJob(item))
            .filter(Boolean)
            .sort((left, right) => Number(right.createdAt || 0) - Number(left.createdAt || 0)));
        };
        request.onerror = () => reject(request.error || new Error("读取历史记录失败。"));
      });
    }

    function persistJob(jobId) {
      const job = jobs.find((item) => item.jobId === jobId);
      if (!job) return;
      writePersistedJob(job).catch((error) => {
        console.warn("[image-tool] persist history failed", errorToMessage(error));
        if (!historySaveErrorShown) {
          historySaveErrorShown = true;
          setStatus("历史记录保存失败，可能是浏览器存储空间不足。", "bad");
        }
      });
    }

    async function writePersistedJob(job) {
      const db = await openHistoryDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction(HISTORY_STORE_NAME, "readwrite")
          .objectStore(HISTORY_STORE_NAME)
          .put(stripTransientJobFields(job));
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error || new Error("保存历史记录失败。"));
      });
    }

    async function deletePersistedJob(jobId) {
      try {
        const db = await openHistoryDb();
        await new Promise((resolve, reject) => {
          const request = db.transaction(HISTORY_STORE_NAME, "readwrite")
            .objectStore(HISTORY_STORE_NAME)
            .delete(jobId);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error || new Error("删除历史记录失败。"));
        });
      } catch (error) {
        console.warn("[image-tool] delete history failed", errorToMessage(error));
      }
    }

    async function clearPersistedJobs() {
      try {
        const db = await openHistoryDb();
        await new Promise((resolve, reject) => {
          const request = db.transaction(HISTORY_STORE_NAME, "readwrite")
            .objectStore(HISTORY_STORE_NAME)
            .clear();
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error || new Error("清空历史记录失败。"));
        });
      } catch (error) {
        console.warn("[image-tool] clear history failed", errorToMessage(error));
      }
    }

    function openHistoryDb() {
      if (historyDbPromise) return historyDbPromise;
      if (!("indexedDB" in window)) return Promise.reject(new Error("当前浏览器不支持永久历史存储。"));
      historyDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(HISTORY_DB_NAME, HISTORY_DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(HISTORY_STORE_NAME)) {
            const store = db.createObjectStore(HISTORY_STORE_NAME, { keyPath: "jobId" });
            store.createIndex("createdAt", "createdAt", { unique: false });
            store.createIndex("updatedAt", "updatedAt", { unique: false });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("打开历史数据库失败。"));
        request.onblocked = () => reject(new Error("历史数据库被其他页面占用。"));
      }).catch((error) => {
        historyDbPromise = null;
        throw error;
      });
      return historyDbPromise;
    }

    function stripTransientJobFields(job) {
      return {
        jobId: job.jobId,
        prompt: job.prompt,
        fill: job.fill || null,
        status: job.status,
        images: Array.isArray(job.images) ? job.images : [],
        error: job.error || null,
        createdAt: job.createdAt || Date.now(),
        updatedAt: job.updatedAt || Date.now()
      };
    }

    function normalizeStoredJob(item) {
      if (!item || typeof item !== "object" || typeof item.jobId !== "string") return null;
      return {
        jobId: item.jobId,
        prompt: item.prompt || "",
        fill: item.fill || null,
        status: item.status || "succeeded",
        images: Array.isArray(item.images) ? item.images : [],
        error: item.error || null,
        createdAt: item.createdAt || Date.now(),
        updatedAt: item.updatedAt || Date.now()
      };
    }

    function computeSize() {
      const resolution = controls.size.value.trim();
      if (!resolution || resolution === "auto") return "auto";
      const longEdge = Number(resolution);
      if (!Number.isFinite(longEdge)) return resolution;
      const ratio = controls.aspectRatio.value;
      const map = {
        "1:1": [1, 1], "3:2": [3, 2], "2:3": [2, 3], "4:3": [4, 3], "3:4": [3, 4],
        "5:4": [5, 4], "4:5": [4, 5], "16:9": [16, 9], "9:16": [9, 16], "2:1": [2, 1],
        "1:2": [1, 2], "21:9": [21, 9], "9:21": [9, 21], "3:1": [3, 1], "1:3": [1, 3]
      };
      const [w, h] = map[ratio] || [1, 1];
      const longRatio = Math.max(w, h);
      const shortRatio = Math.min(w, h);
      const desiredLong = Math.min(longEdge, IMAGE2_SIZE.maxEdge);
      let best = null;
      for (let longSide = IMAGE2_SIZE.multiple; longSide <= IMAGE2_SIZE.maxEdge; longSide += IMAGE2_SIZE.multiple) {
        const rawShortSide = longSide * shortRatio / longRatio;
        [floorToMultiple(rawShortSide, IMAGE2_SIZE.multiple), ceilToMultiple(rawShortSide, IMAGE2_SIZE.multiple)].forEach((shortSide) => {
          const width = w >= h ? longSide : shortSide;
          const height = h >= w ? longSide : shortSide;
          const pixels = width * height;
          const actualRatio = Math.max(width, height) / Math.min(width, height);
          if (width > IMAGE2_SIZE.maxEdge || height > IMAGE2_SIZE.maxEdge || pixels < IMAGE2_SIZE.minPixels || pixels > IMAGE2_SIZE.maxPixels || actualRatio > 3) return;
          const targetRatio = w / h;
          const ratioPenalty = Math.abs((width / height) - targetRatio) * 100;
          const longPenalty = Math.abs(longSide - desiredLong);
          const score = longPenalty + ratioPenalty;
          if (!best || score < best.score) best = { width, height, score };
        });
      }
      return best ? `${best.width}x${best.height}` : "auto";
    }

    function updateSizePreview() {
      updateInlineStatus();
    }

    function updateInlineStatus() {
      controls.status.innerHTML = `实际分辨率： <span class="size-inline" id="sizePreview">${escapeHtml(computeSize())}</span>`;
      controls.sizePreview = $("sizePreview");
    }

      updateInlineStatus();
      persistUiOptions();

    function setBusy(isBusy) {
      $("generateBtn").disabled = isBusy;
      $("generateBtn").textContent = isBusy ? "创建中..." : "开始生成";
    }

    async function parseJsonResponse(response) {
      const text = await response.text();
      return parseJsonTextResponse(response.status, response.statusText, text, response.ok);
    }

    async function parseJsonResponseForJob(response) {
      const text = await response.text();
      let json = {};
      try {
        json = text ? JSON.parse(text) : {};
      } catch {
        json = { rawText: text };
      }
      if (!response.ok) {
        return {
          ...json,
          status: json.status || "failed",
          error: json.error || json.message || json.error_code || text || response.statusText,
          message: json.message || json.error || response.statusText,
          error_code: json.error_code || `HTTP_${response.status}`
        };
      }
      return json;
    }

    function parseJsonTextResponse(status, statusText, text, ok = status >= 200 && status < 300) {
      let json = {};
      try {
        json = text ? JSON.parse(text) : {};
      } catch {
        json = { rawText: text };
      }
      if (!ok) {
        const message = json && json.error
          ? typeof json.error === "string" ? json.error : json.error.message || JSON.stringify(json.error)
          : text || statusText;
        throw new Error(`请求失败 ${status}：${message}`);
      }
      return json;
    }

    function imageToSrc(image) {
      if (!image) return "";
      if (image.b64_json) return `data:${image.mime || mimeFromFormat(controls.outputFormat.value)};base64,${image.b64_json}`;
      if (image.base64) return `data:${image.mime || mimeFromFormat(controls.outputFormat.value)};base64,${image.base64}`;
      return image.url || "";
    }

    function imageName(job, imageIndex, image) {
      return `generated-${job.createdAt || Date.now()}-${imageIndex + 1}.${extensionFromMime(image.mime || mimeFromFormat(controls.outputFormat.value))}`;
    }

    function readPendingJobIds() {
      try {
        const ids = JSON.parse(localStorage.getItem(PENDING_STORAGE_KEY) || "[]");
        return Array.isArray(ids) ? ids.filter((id) => typeof id === "string") : [];
      } catch {
        localStorage.removeItem(PENDING_STORAGE_KEY);
        return [];
      }
    }

    function persistPendingJobs() {
      const ids = jobs.filter((job) => job.status === "queued" || job.status === "running").map((job) => job.jobId);
      localStorage.setItem(PENDING_STORAGE_KEY, JSON.stringify([...new Set(ids)]));
    }

    function addPendingJob(jobId) {
      const ids = new Set(readPendingJobIds());
      ids.add(jobId);
      localStorage.setItem(PENDING_STORAGE_KEY, JSON.stringify([...ids]));
    }

    function removePendingJob(jobId) {
      const ids = readPendingJobIds().filter((id) => id !== jobId);
      localStorage.setItem(PENDING_STORAGE_KEY, JSON.stringify(ids));
    }

    function statusLabel(status) {
      return {
        queued: "排队中",
        running: "生成中",
        succeeded: "生成完成",
        failed: "生成失败"
      }[status] || "任务状态";
    }

    function statusShort(status) {
      return {
        queued: "排",
        running: "生",
        succeeded: "成",
        failed: "败"
      }[status] || "任";
    }

    function shortJob(jobId) {
      return String(jobId || "").slice(0, 8);
    }

    function errorToMessage(error) {
      if (!error) return "未知错误。";
      if (error.message) return error.message;
      if (typeof error === "string") return error;
      try {
        return JSON.stringify(error);
      } catch {
        return String(error);
      }
    }

    function setStatus(message, type = "") {
      latestStatusText = message;
      latestStatusType = type;
      updateInlineStatus();
      setGeneratorFeedback(message, type);
      showAppToast(message, type);
    }

    function setGeneratorFeedback(message, type = "") {
      if (!controls.generatorFeedback) return;
      controls.generatorFeedback.textContent = message || "";
      controls.generatorFeedback.className = ["generator-feedback", type].filter(Boolean).join(" ");
    }

    function showAppToast(message, type = "") {
      if (!controls.appToast || !message) return;
      window.clearTimeout(toastTimer);
      controls.appToast.textContent = message;
      controls.appToast.className = ["app-toast", type].filter(Boolean).join(" ");
      controls.appToast.hidden = false;
      if (type && type !== "busy" && type !== "bad") {
        toastTimer = window.setTimeout(() => {
          controls.appToast.hidden = true;
        }, 3600);
      }
    }

    function clearPromptPlaceholder() {
      if (controls.prompt.value.trim() === PROMPT_PLACEHOLDER) controls.prompt.value = "";
    }

    function getPromptValue() {
      const value = controls.prompt.value.trim();
      return value === PROMPT_PLACEHOLDER ? "" : value;
    }

    function formatFileSize(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) return "";
      if (value < 1024) return `${value} B`;
      const units = ["KB", "MB", "GB"];
      let size = value / 1024;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size >= 10 ? size.toFixed(1) : size.toFixed(2)} ${units[unitIndex]}`;
    }

    function clampNumber(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.min(max, Math.max(min, value));
    }

    function ceilToMultiple(value, multiple) {
      return Math.max(multiple, Math.ceil(value / multiple) * multiple);
    }

    function floorToMultiple(value, multiple) {
      return Math.max(multiple, Math.floor(value / multiple) * multiple);
    }

    function mimeFromFormat(format) {
      if (format === "jpeg" || format === "jpg") return "image/jpeg";
      if (format === "webp") return "image/webp";
      if (format === "svg" || format === "image/svg+xml") return "image/svg+xml";
      return "image/png";
    }

    function extensionFromMime(mime) {
      if (mime === "image/jpeg") return "jpg";
      if (mime === "image/webp") return "webp";
      if (mime === "image/gif") return "gif";
      if (mime === "image/svg+xml") return "svg";
      return "png";
    }

    function safeFilename(name) {
      return String(name || "image.png").replace(/[\\/:*?"<>|]+/g, "-");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
